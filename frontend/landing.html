<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StratifyAI — Intelligent Business Decision Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            width: 100%;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
        }
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 20px;
        }
        .pill-badge {
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 30px;
            background: rgba(34, 197, 94, 0.05);
            letter-spacing: 1px;
        }
        .hero h1 {
            font-size: 4.5rem;
            margin-bottom: 25px;
            line-height: 1.1;
            max-width: 900px;
        }
        .hero p.subtitle {
            font-size: 1.2rem;
            max-width: 650px;
            margin: 0 auto 40px;
            color: var(--text-secondary);
        }
        .theme-toggle-nav {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
            transition: color 0.3s ease;
        }
        .theme-toggle-nav:hover {
            color: var(--text-primary);
        }
    </style>
    <script>
        // Check saved theme
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light-theme');
        }
        function toggleTheme() {
            document.documentElement.classList.toggle('light-theme');
            document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
        }
        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light-theme');
            }
        });
    </script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 22h20L12 2z" fill="var(--accent-primary)"/>
            </svg>
            STRATIFYAI
        </div>
        <button class="theme-toggle-nav" onclick="toggleTheme()" aria-label="Toggle Theme">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5"/>
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
        </button>
    </nav>
    <div class="hero">
        <div class="pill-badge">ADVANCED ENGINE ACTIVE</div>
        <h1>Architect Your Strategy with Precision</h1>
        <p class="subtitle">StratifyAI combines deterministic modeling and executive-level logic to analyze your financials, predict optimal pricing, and chart a data-driven path to market expansion.</p>
        <a href="index.html" class="btn" style="width: auto; padding: 18px 45px;">Start Architecture &rarr;</a>
    </div>
</body>
</html>
